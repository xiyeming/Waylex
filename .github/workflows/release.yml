name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build libgtk-3-dev libblkid-dev liblzma-dev \
            libssl-dev pkg-config libsqlite3-dev

      - name: Enable Linux desktop
        working-directory: flutter
        run: flutter config --enable-linux-desktop

      - name: Get Flutter dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/Cargo.lock') }}

      - name: Build Rust library
        working-directory: native
        run: cargo build --release

      - name: Generate FFI bindings
        working-directory: flutter
        run: |
          cargo install flutter_rust_bridge_codegen
          flutter_rust_bridge_codegen generate

      - name: Flutter doctor
        working-directory: flutter
        run: flutter doctor -v

      - name: Build Flutter Linux
        working-directory: flutter
        run: flutter build linux --release --verbose
        continue-on-error: true

      - name: Copy native library to bundle
        run: |
          mkdir -p flutter/build/linux/x64/release/bundle/lib
          cp native/target/release/libflutter_translate_native.so flutter/build/linux/x64/release/bundle/lib/

      - name: Package portable tarball
        run: |
          cd flutter/build/linux/x64/release
          tar czf waylex-linux-x64.tar.gz bundle/

      - name: Build AppImage
        run: |
          sudo apt-get install -y wget
          ./scripts/package_appimage.sh

      - name: Rename AppImage
        run: |
          mv build/Waylex-x86_64.AppImage build/Waylex-linux-x86_64.AppImage || true
          mv build/flutter-translate-x86_64.AppImage build/Waylex-linux-x86_64.AppImage || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            build/*.AppImage
            flutter/build/linux/x64/release/waylex-linux-x64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain with targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/Cargo.lock') }}

      - name: Build x86_64
        working-directory: native
        run: cargo build --release --target x86_64-apple-darwin
        continue-on-error: true

      - name: Build aarch64
        working-directory: native
        run: cargo build --release --target aarch64-apple-darwin
        continue-on-error: true

      - name: Create Universal Binary with lipo
        working-directory: native
        run: |
          mkdir -p target/universal/release
          lipo -create \
            target/x86_64-apple-darwin/release/libflutter_translate_native.dylib \
            target/aarch64-apple-darwin/release/libflutter_translate_native.dylib \
            -output target/universal/release/libflutter_translate_native.dylib
          lipo -info target/universal/release/libflutter_translate_native.dylib

      - name: Package macOS dylib
        working-directory: native
        run: |
          mkdir -p waylex-macos-universal
          cp target/universal/release/libflutter_translate_native.dylib waylex-macos-universal/
          tar czf waylex-macos-universal.tar.gz waylex-macos-universal/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: native/waylex-macos-universal.tar.gz

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event.inputs.draft || 'true' }}
          generate_release_notes: true
          files: |
            artifacts/*
